<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinternship Universal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--s1:#10101c;--s2:#181827;--s3:#1e1e30;
  --border:rgba(255,255,255,0.07);--text:#eeeeff;--muted:#7777aa;
  --fk:#ff6b6b;--euc:#4d96ff;--krus:#6bcb77;
  --gold:#ffd700;--silver:#b8c0cc;--bronze:#cd7f32;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 0%,rgba(255,107,107,0.06) 0%,transparent 45%),
  radial-gradient(ellipse at 85% 10%,rgba(77,150,255,0.06) 0%,transparent 45%),
  radial-gradient(ellipse at 50% 100%,rgba(107,203,119,0.04) 0%,transparent 40%);}
.wrap{position:relative;z-index:1;}
header{padding:22px 44px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(16,16,28,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#ff6b6b,#4d96ff);
  display:flex;align-items:center;justify-content:center;font-size:22px;}
.logo-text h1{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.3px;}
.logo-text p{font-size:11px;color:var(--muted);margin-top:2px;}
.hbadges{display:flex;gap:10px;}
.badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--s2);border:1px solid var(--border);color:var(--muted);}
.badge.live{background:rgba(107,203,119,0.12);border-color:rgba(107,203,119,0.3);color:#6bcb77;}
.tab-bar{display:flex;gap:2px;padding:0 44px;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:14px 22px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);font-weight:700;}
.tab-fk.active{border-bottom-color:var(--fk);}
.tab-euc.active{border-bottom-color:var(--euc);}
.tab-krus.active{border-bottom-color:var(--krus);}
.tab-all.active{border-bottom-color:#c77dff;}
.dot{width:7px;height:7px;border-radius:50%;}
.main{padding:36px 44px 80px;}
.sec{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
.gc{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:22px;margin-bottom:32px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;
  position:relative;overflow:hidden;transition:transform 0.2s,border-color 0.2s;}
.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.12);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca,transparent);}
.ci{font-size:22px;margin-bottom:10px;}
.cl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.cv{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1;}
.cs{font-size:12px;color:var(--muted);margin-top:5px;}
.pt{background:rgba(255,255,255,0.05);border-radius:6px;height:9px;overflow:hidden;margin:6px 0;}
.pf{height:100%;border-radius:6px;background:var(--pc);width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.ph{display:flex;justify-content:space-between;margin-bottom:5px;}
.pn{font-size:13px;font-weight:600;}
.pp{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;}
.pm{font-size:11px;color:var(--muted);margin-top:5px;display:flex;gap:12px;}
.pm b{color:var(--text);}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-bottom:32px;}
.ac{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform 0.2s;}
.ac:hover{transform:translateY(-2px);}
.ah{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.an{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.achip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--cbg);color:var(--cc);}
.anum{display:flex;gap:8px;margin-top:12px;}
.anb{flex:1;background:var(--s2);border-radius:9px;padding:9px 6px;text-align:center;}
.anv{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:2px;}
.anl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
.t5{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:32px;}
.t5t{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.sl{display:flex;flex-direction:column;gap:9px;}
.sr{background:var(--s2);border:1px solid var(--border);border-radius:11px;
  padding:13px 15px;display:flex;align-items:center;gap:12px;transition:all 0.2s;}
.sr:hover{border-color:rgba(255,255,255,0.12);transform:translateX(3px);}
.srk{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex-shrink:0;}
.r1{background:linear-gradient(135deg,#ffd700,#ff9500);color:#000;}
.r2{background:linear-gradient(135deg,#b8c0cc,#8899aa);color:#000;}
.r3{background:linear-gradient(135deg,#cd7f32,#8b5030);color:#fff;}
.r4,.r5{background:var(--s3);color:var(--muted);}
.si{flex:1;min-width:0;}
.sn{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.se{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.sm{display:flex;gap:12px;flex-shrink:0;}
.smv{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;text-align:right;}
.sml{font-size:10px;color:var(--muted);text-align:right;}
.cmap{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:32px;}
.cmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:7px;margin-top:14px;}
.cmc{border-radius:7px;padding:9px 5px;text-align:center;border:1px solid transparent;transition:transform 0.15s;cursor:default;}
.cmc:hover{transform:scale(1.06);}
.cmn{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;margin-bottom:2px;}
.cmp2{font-size:10px;font-weight:600;}
.cc-hd{display:flex;align-items:center;gap:13px;margin-bottom:18px;}
.cc-av{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.cc-nm{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.cc-sb{font-size:12px;margin-top:3px;}
.cc-mt{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.cc-mv{background:var(--s2);border-radius:9px;padding:11px;text-align:center;}
.cc-vv{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:2px;}
.cc-vl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
.cc-cl{cursor:pointer;}
.cc-cl:hover .cc-nm{text-decoration:underline;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.page{animation:fadeUp 0.3s ease;}
@media(max-width:900px){
  header,\.main{padding-left:20px;padding-right:20px;}
  .tab-bar{padding:0 20px;}
  .g5,.g4{grid-template-columns:repeat(2,1fr);}
  .g2{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">
    <div class="logo-mark">🚀</div>
    <div class="logo-text">
      <h1>Vinternship Universal Dashboard</h1>
      <p>Live Performance &amp; Progress Overview · All Cohorts</p>
    </div>
  </div>
  <div class="hbadges">
    <span class="badge">📅 Mar 2026</span>
    <span class="badge live">● 2 Cohorts Loaded</span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab tab-all active" onclick="show('overview')" id="t-overview">
    <span class="dot" style="background:linear-gradient(135deg,#ff6b6b,#4d96ff)"></span>All Cohorts
  </button>
  <button class="tab tab-fk" onclick="show('fk')" id="t-fk">
    <span class="dot" style="background:var(--fk)"></span>🔑 Founder Keepers
  </button>
  <button class="tab tab-euc" onclick="show('euc')" id="t-euc">
    <span class="dot" style="background:var(--euc)"></span>📐 Euclideans
  </button>
  <button class="tab tab-krus" onclick="show('krus')" id="t-krus">
    <span class="dot" style="background:var(--krus)"></span>🌐 Kruskalians
  </button>
</div>

<div class="main" id="mc"></div>
</div>

<script>
const D = {
  fk:{
    name:'Founder Keepers',emoji:'🔑',color:'#ff6b6b',total:309,maxAtt:23,
    avgVibe:98.7,avgHp:133.8,avgAtt:22.2,
    vibe100:267,vibe50:306,vibeNone:3,attFull:190,att15:302,d1Done:54,d1Tot:291,
    activities:[
      {name:'Vibe Progress',icon:'⚡',color:'#ff6b6b',avg:98.7,done:267,prog:39,none:3,tot:309},
      {name:'Attendance',icon:'📅',color:'#ffd93d',avg:96.5,done:190,prog:112,none:7,tot:309,note:'23 sessions total'},
      {name:'Daily Activities (D1)',icon:'📚',color:'#6bcb77',avg:18.6,done:54,prog:0,none:237,tot:291},
      {name:'Health Points',icon:'❤️',color:'#ff9f43',avg:66.9,done:0,prog:309,none:0,tot:309,note:'Avg: 133.8 HP'},
    ],
    top5:[
      {name:'Amit Kumar',email:'amit...@gmail.com',vibe:100,hp:235,att:22},
      {name:'Abhrankan Chakrabarti',email:'abhrankan@gmail.com',vibe:100,hp:231,att:23},
      {name:'Debrup Chatterjee',email:'debrup...@gmail.com',vibe:100,hp:219,att:23},
      {name:'Arjun Shaw',email:'arjun...@gmail.com',vibe:100,hp:197,att:23},
      {name:'Garlapati Venkata Naga Ramya Sri',email:'gar...@gmail.com',vibe:100,hp:195,att:22},
    ],
  },
  euc:{
    name:'Euclideans',emoji:'📐',color:'#4d96ff',total:338,
    avgVibe:99.96,avgCs:85.04,avgHp:168.7,
    vibe100:318,cs100:118,terminated:162,institutes:148,states:22,
    activities:[
      {name:'Vibe Progress',icon:'⚡',color:'#4d96ff',avg:99.96,done:318,prog:20,none:0,tot:338},
      {name:'Case Study Progress',icon:'📚',color:'#6bcb77',avg:85.04,done:118,prog:220,none:0,tot:338},
      {name:'Health Points',icon:'❤️',color:'#ff9f43',avg:84.35,done:0,prog:338,none:0,tot:338,note:'Avg: 168.7 HP'},
    ],
    cs:[
      {n:1,p:99},{n:2,p:99},{n:3,p:98},{n:4,p:99},{n:5,p:98},{n:6,p:98},{n:7,p:98},
      {n:8,p:98},{n:9,p:98},{n:10,p:98},{n:11,p:98},{n:12,p:98},{n:13,p:98},{n:14,p:99},
      {n:15,p:98},{n:16,p:98},{n:17,p:98},{n:18,p:98},{n:19,p:94},{n:20,p:91},{n:21,p:91},
      {n:22,p:88},{n:23,p:88},{n:24,p:84},{n:25,p:84},{n:26,p:82},{n:27,p:84},{n:28,p:82},
      {n:29,p:77},{n:30,p:91},{n:31,p:90},{n:32,p:86},{n:33,p:99},{n:34,p:98},{n:35,p:98},
      {n:36,p:97},{n:37,p:98},{n:38,p:98},{n:39,p:99},{n:40,p:97},{n:41,p:98},{n:42,p:99},
    ],
    top5:[
      {name:'Nilashis Saha',email:'nilashis37@gmail.com',overall:100,cs:100,vibe:100,hp:221},
      {name:'Kanak Maheshwari',email:'kanak...@gmail.com',overall:100,cs:100,vibe:100,hp:201},
      {name:'Paladi Sai Nirvignaa',email:'paladi...@gmail.com',overall:100,cs:100,vibe:100,hp:201},
      {name:'PRABRITY RANI',email:'prabrity608@gmail.com',overall:100,cs:100,vibe:100,hp:201},
      {name:'Sanjeet Kumar',email:'sanjeet...@gmail.com',overall:100,cs:100,vibe:100,hp:201},
    ],
  },
};

function pb(pct, color, label, val) {
  return `<div style="margin-bottom:10px">
    <div class="ph"><span class="pn">${label}</span><span class="pp" style="color:${color}">${val}</span></div>
    <div class="pt"><div class="pf" style="--pc:${color}" data-w="${pct}"></div></div>
  </div>`;
}

function srow(s, i, key) {
  const rc = `r${Math.min(i,5)}`;
  const isFK = key==='fk';
  const m = isFK
    ? `<div class="smv" style="color:var(--fk)">${s.vibe}%</div><div class="sml">Vibe</div></div>
       <div class="sm"><div class="smv" style="color:#ff9f43">${s.hp}</div><div class="sml">HP</div></div>
       <div class="sm"><div class="smv" style="color:#ffd93d">${s.att}/${D.fk.maxAtt}</div><div class="sml">Att</div>`
    : `<div class="smv" style="color:var(--euc)">${s.overall}%</div><div class="sml">Overall</div></div>
       <div class="sm"><div class="smv" style="color:#6bcb77">${s.cs}%</div><div class="sml">CS</div></div>
       <div class="sm"><div class="smv" style="color:#ff9f43">${s.hp}</div><div class="sml">HP</div>`;
  return `<div class="sr"><div class="srk ${rc}">${i}</div>
    <div class="si"><div class="sn">${s.name}</div><div class="se">${s.email}</div></div>
    <div class="sm"><${m}</div></div>`;
}

function actCard(a) {
  const c = a.avg>=90?'#6bcb77':a.avg>=70?'#ffd93d':'#ff6b6b';
  return `<div class="ac">
    <div class="ah"><div class="an">${a.icon} ${a.name}</div>
    <div class="achip" style="--cbg:${c}22;--cc:${c}">${a.avg.toFixed(1)}%</div></div>
    <div class="pt"><div class="pf" style="--pc:${a.color}" data-w="${Math.min(a.avg,100)}"></div></div>
    ${a.note?`<div style="font-size:11px;color:var(--muted);margin-top:5px">${a.note}</div>`:''}
    <div class="anum">
      <div class="anb"><div class="anv" style="color:#6bcb77">${a.done}</div><div class="anl">✅ Done</div></div>
      <div class="anb"><div class="anv" style="color:#ffd93d">${a.prog}</div><div class="anl">⏳ Progress</div></div>
      <div class="anb"><div class="anv" style="color:#ff6b6b">${a.none}</div><div class="anl">❌ Not Yet</div></div>
    </div>
  </div>`;
}

function cohortOverviewCard(key) {
  const c = D[key];
  const v2 = key==='fk'?(c.avgAtt/c.maxAtt*100).toFixed(1):c.avgCs.toFixed(1);
  const v2l = key==='fk'?'Attendance':'Case Study';
  const v2c = key==='fk'?'#ffd93d':'#6bcb77';
  return `<div class="card cc-cl" onclick="show('${key}')" style="padding:24px;">
    <div class="cc-hd">
      <div class="cc-av" style="background:${c.color}22">${c.emoji}</div>
      <div><div class="cc-nm">${c.name}</div>
      <div class="cc-sb" style="color:${c.color}">${c.total} students · Click to drill down →</div></div>
    </div>
    <div class="cc-mt">
      <div class="cc-mv"><div class="cc-vv" style="color:${c.color}">${c.total}</div><div class="cc-vl">Students</div></div>
      <div class="cc-mv"><div class="cc-vv" style="color:#c77dff">${c.avgVibe.toFixed(0)}%</div><div class="cc-vl">Vibe Avg</div></div>
      <div class="cc-mv"><div class="cc-vv" style="color:#ff9f43">${c.avgHp.toFixed(0)}</div><div class="cc-vl">Avg HP</div></div>
    </div>
    ${pb(c.avgVibe,c.color,'Vibe Progress',c.avgVibe.toFixed(1)+'%')}
    ${pb(parseFloat(v2),v2c,v2l,v2+'%')}
  </div>`;
}

function renderOverview() {
  const tot = D.fk.total+D.euc.total;
  const avgV = ((D.fk.avgVibe*D.fk.total+D.euc.avgVibe*D.euc.total)/tot).toFixed(1);
  const avgH = ((D.fk.avgHp*D.fk.total+D.euc.avgHp*D.euc.total)/tot).toFixed(1);
  const vibe100 = D.fk.vibe100+D.euc.vibe100;
  return `<div class="page">
    <div class="sec">📊 Global Summary</div>
    <div class="g4">
      <div class="card" style="--ca:linear-gradient(90deg,#ff6b6b,#4d96ff)">
        <div class="ci">👥</div><div class="cl">Total Students</div>
        <div class="cv" style="background:linear-gradient(135deg,#ff6b6b,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${tot}</div>
        <div class="cs">Across 2 active cohorts</div>
      </div>
      <div class="card" style="--ca:#c77dff">
        <div class="ci">⚡</div><div class="cl">Combined Avg Vibe</div>
        <div class="cv" style="color:#c77dff">${avgV}%</div>
        <div class="cs">${vibe100} students at 100%</div>
      </div>
      <div class="card" style="--ca:#ff9f43">
        <div class="ci">❤️</div><div class="cl">Combined Avg HP</div>
        <div class="cv" style="color:#ff9f43">${avgH}</div>
        <div class="cs">Health Points average</div>
      </div>
      <div class="card" style="--ca:#6bcb77">
        <div class="ci">📚</div><div class="cl">Euclideans Avg CS</div>
        <div class="cv" style="color:#6bcb77">${D.euc.avgCs.toFixed(1)}%</div>
        <div class="cs">${D.euc.cs100} completed all studies</div>
      </div>
    </div>

    <div class="sec">🏛️ Cohort Overview</div>
    <div class="gc">
      ${cohortOverviewCard('fk')}
      ${cohortOverviewCard('euc')}
      <div class="card" style="opacity:0.45;cursor:default;">
        <div class="cc-hd"><div class="cc-av" style="background:rgba(107,203,119,0.15)">🌐</div>
        <div><div class="cc-nm">Kruskalians</div><div class="cc-sb" style="color:#6bcb77">Upload sheet to load data</div></div></div>
        <div style="text-align:center;padding:18px 0;color:var(--muted);font-size:13px">📁 No data uploaded yet</div>
      </div>
    </div>

    <div class="sec">📈 Side-by-Side Comparison</div>
    <div class="g2">
      <div class="card">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px;color:var(--fk)">🔑 Founder Keepers</div>
        ${pb(D.fk.avgVibe,'#ff6b6b','Vibe Progress',D.fk.avgVibe.toFixed(1)+'%')}
        ${pb(D.fk.avgAtt/D.fk.maxAtt*100,'#ffd93d','Attendance',((D.fk.avgAtt/D.fk.maxAtt*100).toFixed(1))+'%')}
        ${pb(D.fk.avgHp/200*100,'#ff9f43','Health Points (scaled)',D.fk.avgHp.toFixed(0))}
        ${pb(D.fk.d1Done/D.fk.d1Tot*100,'#6bcb77','D1 Case Study',D.fk.d1Done+'/'+D.fk.d1Tot)}
      </div>
      <div class="card">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px;color:var(--euc)">📐 Euclideans</div>
        ${pb(D.euc.avgVibe,'#4d96ff','Vibe Progress',D.euc.avgVibe.toFixed(1)+'%')}
        ${pb(D.euc.avgCs,'#6bcb77','Case Study Progress',D.euc.avgCs.toFixed(1)+'%')}
        ${pb(D.euc.avgHp/200*100,'#ff9f43','Health Points (scaled)',D.euc.avgHp.toFixed(0))}
        ${pb(D.euc.cs100/D.euc.total*100,'#c77dff','CS Fully Completed',D.euc.cs100+'/'+D.euc.total)}
      </div>
    </div>

    <div class="sec">🏆 Top 5 Per Cohort</div>
    <div class="g2">
      <div class="t5" style="border-left:3px solid var(--fk)">
        <div class="t5t">🔑 Founder Keepers</div>
        <div class="sl">${D.fk.top5.map((s,i)=>srow(s,i+1,'fk')).join('')}</div>
      </div>
      <div class="t5" style="border-left:3px solid var(--euc)">
        <div class="t5t">📐 Euclideans</div>
        <div class="sl">${D.euc.top5.map((s,i)=>srow(s,i+1,'euc')).join('')}</div>
      </div>
    </div>
  </div>`;
}

function renderFK() {
  const c = D.fk;
  return `<div class="page">
    <div class="sec">🔑 Founder Keepers — Overview</div>
    <div class="g5">
      <div class="card" style="--ca:var(--fk)"><div class="ci">👥</div><div class="cl">Students</div><div class="cv" style="color:var(--fk)">${c.total}</div><div class="cs">Active participants</div></div>
      <div class="card" style="--ca:#c77dff"><div class="ci">⚡</div><div class="cl">Avg Vibe</div><div class="cv" style="color:#c77dff">${c.avgVibe.toFixed(1)}%</div><div class="cs">${c.vibe100} at 100%</div></div>
      <div class="card" style="--ca:#ffd93d"><div class="ci">📅</div><div class="cl">Avg Attendance</div><div class="cv" style="color:#ffd93d">${c.avgAtt.toFixed(1)}<span style="font-size:14px;color:var(--muted)">/${c.maxAtt}</span></div><div class="cs">${c.attFull} with perfect attendance</div></div>
      <div class="card" style="--ca:#ff9f43"><div class="ci">❤️</div><div class="cl">Avg Health Points</div><div class="cv" style="color:#ff9f43">${c.avgHp.toFixed(0)}</div><div class="cs">Out of ~200 base HP</div></div>
      <div class="card" style="--ca:#6bcb77"><div class="ci">📚</div><div class="cl">D1 Completed</div><div class="cv" style="color:#6bcb77">${c.d1Done}</div><div class="cs">of ${c.d1Tot} enrolled</div></div>
    </div>

    <div class="sec">📋 Activity Breakdown</div>
    <div class="ag">${c.activities.map(actCard).join('')}</div>

    <div class="sec">📊 Attendance Deep-Dive</div>
    <div class="g3">
      <div class="card" style="--ca:#ffd93d"><div class="ci">🎯</div><div class="cl">Perfect Attendance</div><div class="cv" style="color:#ffd93d">${c.attFull}</div><div class="cs">${(c.attFull/c.total*100).toFixed(1)}% of cohort (23/23)</div></div>
      <div class="card" style="--ca:#6bcb77"><div class="ci">📈</div><div class="cl">≥15 Sessions</div><div class="cv" style="color:#6bcb77">${c.att15}</div><div class="cs">${(c.att15/c.total*100).toFixed(1)}% of cohort</div></div>
      <div class="card" style="--ca:var(--fk)"><div class="ci">📅</div><div class="cl">Total Sessions</div><div class="cv" style="color:var(--fk)">${c.maxAtt}</div><div class="cs">Program duration</div></div>
    </div>

    <div class="sec">🏆 Top 5 Students — by Vibe + HP + Attendance</div>
    <div class="t5" style="border-left:3px solid var(--fk)">
      <div class="t5t">🔑 Founder Keepers Top Performers</div>
      <div class="sl">${c.top5.map((s,i)=>srow(s,i+1,'fk')).join('')}</div>
    </div>
  </div>`;
}

function renderEUC() {
  const c = D.euc;
  const cells = c.cs.map(x=>{
    const bg=x.p>=98?'rgba(107,203,119,0.2)':x.p>=90?'rgba(255,217,61,0.2)':x.p>=80?'rgba(255,159,67,0.2)':'rgba(255,107,107,0.2)';
    const col=x.p>=98?'#6bcb77':x.p>=90?'#ffd93d':x.p>=80?'#ff9f43':'#ff6b6b';
    return `<div class="cmc" style="background:${bg};border-color:${col}44" title="Case Study ${x.n}: ${x.p}%">
      <div class="cmn" style="color:${col}">${x.n}</div><div class="cmp2" style="color:${col}">${x.p}%</div>
    </div>`;
  }).join('');

  return `<div class="page">
    <div class="sec">📐 Euclideans — Overview</div>
    <div class="g5">
      <div class="card" style="--ca:var(--euc)"><div class="ci">👥</div><div class="cl">Active Students</div><div class="cv" style="color:var(--euc)">${c.total}</div><div class="cs">${c.terminated} terminated</div></div>
      <div class="card" style="--ca:#c77dff"><div class="ci">⚡</div><div class="cl">Avg Vibe</div><div class="cv" style="color:#c77dff">${c.avgVibe.toFixed(1)}%</div><div class="cs">${c.vibe100} at 100%</div></div>
      <div class="card" style="--ca:#6bcb77"><div class="ci">📚</div><div class="cl">Avg Case Study</div><div class="cv" style="color:#6bcb77">${c.avgCs.toFixed(1)}%</div><div class="cs">${c.cs100} fully completed</div></div>
      <div class="card" style="--ca:#ff9f43"><div class="ci">❤️</div><div class="cl">Avg Health Points</div><div class="cv" style="color:#ff9f43">${c.avgHp.toFixed(1)}</div><div class="cs">Out of ~200 base HP</div></div>
      <div class="card" style="--ca:#ff6b6b"><div class="ci">🚫</div><div class="cl">Terminated</div><div class="cv" style="color:#ff6b6b">${c.terminated}</div><div class="cs">Vibe dropped below 50%</div></div>
    </div>

    <div class="sec">📋 Activity Breakdown</div>
    <div class="ag">${c.activities.map(actCard).join('')}</div>

    <div class="sec">🏫 Geographic Reach</div>
    <div class="g2" style="margin-bottom:32px">
      <div class="card" style="--ca:var(--euc)"><div class="ci">🏛️</div><div class="cl">Institutes Represented</div><div class="cv" style="color:var(--euc)">${c.institutes}</div><div class="cs">Colleges &amp; universities across India</div></div>
      <div class="card" style="--ca:#c77dff"><div class="ci">🗺️</div><div class="cl">States Represented</div><div class="cv" style="color:#c77dff">${c.states}</div><div class="cs">States / UTs participating</div></div>
    </div>

    <div class="sec">🗂️ Case Study Heatmap (42 Studies)</div>
    <div class="cmap">
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;margin-bottom:12px">
        <span style="color:#6bcb77">● ≥98% Excellent</span>
        <span style="color:#ffd93d">● 90–97% Good</span>
        <span style="color:#ff9f43">● 80–89% Average</span>
        <span style="color:#ff6b6b">● &lt;80% Needs Attention</span>
      </div>
      <div class="cmg">${cells}</div>
    </div>

    <div class="sec">🏆 Top 5 Students — by Overall Progress + HP</div>
    <div class="t5" style="border-left:3px solid var(--euc)">
      <div class="t5t">📐 Euclideans Top Performers</div>
      <div class="sl">${c.top5.map((s,i)=>srow(s,i+1,'euc')).join('')}</div>
    </div>
  </div>`;
}

function renderKrus() {
  return `<div class="page">
    <div style="text-align:center;padding:80px 20px">
      <div style="font-size:60px;margin-bottom:20px">🌐</div>
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:10px">Kruskalians</div>
      <div style="color:var(--muted);font-size:14px;line-height:1.8;max-width:400px;margin:0 auto">
        No data uploaded for this cohort yet.<br>Upload the Kruskalians Excel sheet to see their full dashboard — activity progress, top 5 students, attendance, vibe &amp; health points.
      </div>
      <div style="margin-top:28px;display:inline-block;padding:14px 22px;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px">
        📁 Expected: <strong style="color:var(--text)">Kruskalians_Dashboard.xlsx</strong>
      </div>
    </div>
  </div>`;
}

function show(p) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('t-'+p).classList.add('active');
  const mc = document.getElementById('mc');
  if(p==='overview') mc.innerHTML=renderOverview();
  else if(p==='fk') mc.innerHTML=renderFK();
  else if(p==='euc') mc.innerHTML=renderEUC();
  else mc.innerHTML=renderKrus();
  setTimeout(()=>{
    document.querySelectorAll('.pf').forEach(el=>{
      el.style.width=Math.min(parseFloat(el.dataset.w||0),100)+'%';
    });
  },80);
}

show('overview');
</script>
</body>
</html>
